    <main>
        <h2>Fale Conosco / Reservas</h2>
        <p>Tem alguma dúvida ou deseja reservar uma mesa para um evento especial? Preencha o formulário abaixo:</p>

        <form id="formulario-contato">
            <div class="campo-form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="campo-form">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo-form">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>

            <div class="campo-form">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
            </div>

            <button type="submit" id="botao-enviar">Enviar Mensagem</button>
        </form>
    </main>

    <footer>
        <p>© 2026 Burger Tech - Todos os direitos reservados.</p>
    
    </footer>
